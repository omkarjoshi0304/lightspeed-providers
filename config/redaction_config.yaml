redaction_patterns:
  - pattern: "(?i)api[_-]?key[:=\\s]+[\\w-]{8,}"
    replacement: "[REDACTED_API_KEY]"

  - pattern: "(?i)token[:=\\s]+[\\w-]{10,}"
    replacement: "[REDACTED_TOKEN]"

  - pattern: "(?i)password[:=\\s]+[^\\s]+"
    replacement: "[REDACTED_PASSWORD]"

  - pattern: "(?i)secret[:=\\s]+[^\\s]+"
    replacement: "[REDACTED_SECRET]"

  - pattern: "(?i)oc login.*--token=([\\w-]+)"
    replacement: "oc login --token=[REDACTED_TOKEN]"

  - pattern: "\\b(10\\.\\d{1,3}\\.\\d{1,3}\\.\\d{1,3})\\b"
    replacement: "[REDACTED_PRIVATE_IP]"

  - pattern: "(?i)(?:bearer\\s+)?([a-z0-9-_]{20,})"
    replacement: "[REDACTED_BEARER_TOKEN]"
